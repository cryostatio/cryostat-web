name: Require semantic labels

on:
  pull_request:
    types:
      - opened
      - labeled
      - unlabeled
      - synchronize

jobs:
  check-pr-label-and-comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: yashhy/pr-label-check-and-comment-action@135ccb75611ae2838bb58c842dd0e797ca35424c # 1.0.1
        with:
          # This list is duplicated from release-drafter.yml
          required_labels: 'chore,ci,cleanup,docs,feat,fix,perf,refactor,style,test'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
